<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PEGEL://BONN</title>
<meta name="description" content="Live ASCII water level terminal for German rivers, powered by PEGELONLINE (WSV).">
<style>
  :root {
    --paper: #fbfbf9;
    --ink: #141414;
    --dim: #a6a6a6;
    --mid: #5c5c5c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: ui-monospace, 'SF Mono', Monaco, monospace;
    background: var(--paper);
    color: var(--ink);
  }
  main {
    margin: 5vh auto 0;
    padding: 1.6em 1.8em;
    border: 2px solid var(--ink);
  }
  pre {
    margin: 0;
    line-height: 1.2;
    white-space: pre;
  }
  .d { color: var(--dim); }
  .b { color: var(--ink); font-weight: 700; }
  .w { color: var(--mid); }
  form {
    margin-top: 1.4em;
    padding-top: 1em;
    border-top: 2px solid var(--ink);
    color: var(--dim);
    font-size: 0.9em;
  }
  form input {
    font: inherit;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    width: 14ch;
    padding: 0 0.2ch;
    outline: none;
  }
  #station-input { text-transform: uppercase; }
  #adsb-input { width: 26ch; text-transform: none; }
  footer {
    margin: 1.2em 0 2em;
    font-size: 0.72em;
    color: var(--dim);
    text-align: center;
    line-height: 1.8;
  }
  footer a { color: var(--ink); text-decoration: underline; }
</style>
</head>
<body>
<main>
  <pre id="screen">loadingÔÇŽ</pre>
  <form id="prompt" autocomplete="off">&gt; pegel --station
    <input id="station-input" name="station" list="stations" spellcheck="false" aria-label="station name">
    <datalist id="stations"></datalist> --adsb
    <input id="adsb-input" name="adsb" spellcheck="false" placeholder="receiver url (optional)"
      aria-label="ADS-B receiver URL"> --refresh 300s
  </form>
</main>
<footer>
  data: <a href="https://www.pegelonline.wsv.de" rel="noopener">PEGELONLINE</a> &copy; WSV, refreshed every 5 min
  ┬Ě any station: <a href="?station=K├ľLN">?station=K├ľLN</a>
  ┬Ě <a href="https://github.com/bmmmm/pegel-visual" rel="noopener">source</a>
  ┬Ě <a href="https://ko-fi.com/bmabma" rel="noopener">support on ko-fi</a>
</footer>
<script>
'use strict';

const API = 'https://www.pegelonline.wsv.de/webservices/rest-api/v2';
const COLS = 84;
const CHART_ROWS = 15;
const SPARK_ROWS = 4;
const PROFILE_ROWS = 6;
const REFRESH_MS = 5 * 60 * 1000;

const screen = document.getElementById('screen');
const station = (new URLSearchParams(location.search).get('station') || 'BONN').toUpperCase();
document.title = 'PEGEL://' + station;

const state = {
  info: null,       // station meta: km, water
  gauge: null,      // W timeseries: current, characteristic values, gauge zero
  history: [],      // 15-day measurements
  neighbors: [],    // [upstream?, self, downstream?] with elevation data
  aircraft: [],     // live ADS-B positions from the user's own receiver
  adsbOk: null,     // null = off, true/false = last fetch result
  error: null,
};

// ---------- data ----------

async function getJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status + ' ' + url.replace(API, ''));
  return res.json();
}

async function loadData() {
  try {
    const enc = encodeURIComponent(station);
    const [info, gauge, history] = await Promise.all([
      getJson(`${API}/stations/${enc}.json`),
      getJson(`${API}/stations/${enc}/W.json?includeCurrentMeasurement=true&includeCharacteristicValues=true`),
      getJson(`${API}/stations/${enc}/W/measurements.json?start=P15D`).catch(() => []),
    ]);
    state.info = info;
    state.gauge = gauge;
    state.history = history;
    state.error = null;
    loadNeighbors(info).catch(() => {});
  } catch (e) {
    state.error = `station "${station}" failed: ${e.message}\n` +
      `check the name against ${API}/stations.json or try ?station=BONN`;
  }
}

async function loadNeighbors(info) {
  const water = encodeURIComponent(info.water.shortname);
  const all = (await getJson(`${API}/stations.json?waters=${water}`))
    .filter(s => typeof s.km === 'number')
    .sort((a, b) => a.km - b.km);
  const i = all.findIndex(s => s.uuid === info.uuid);
  if (i < 0) return;
  const picks = [all[i - 1], all[i], all[i + 1]].filter(Boolean);
  const enriched = await Promise.all(picks.map(async s => {
    const g = s.uuid === info.uuid ? state.gauge :
      await getJson(`${API}/stations/${encodeURIComponent(s.shortname)}/W.json?includeCurrentMeasurement=true`).catch(() => null);
    if (!g || !g.gaugeZero || !g.currentMeasurement) return null;
    return {
      name: s.shortname, km: s.km,
      lat: s.latitude, lon: s.longitude,
      elev: g.gaugeZero.value + g.currentMeasurement.value / 100,
    };
  }));
  state.neighbors = enriched.filter(Boolean);
}

// ---------- ADS-B (optional, own receiver via --adsb) ----------

const ADSB_REFRESH_MS = 2500;
let adsbRaw = new URLSearchParams(location.search).get('adsb')
  || localStorage.getItem('pegel.adsb') || '';

function adsbEndpoint(raw) {
  if (!raw) return '';
  let u = /^https?:\/\//.test(raw) ? raw : 'http://' + raw;
  if (!u.endsWith('.json')) u = u.replace(/\/+$/, '') + '/data/aircraft.json';
  return u;
}

async function loadAircraft() {
  const url = adsbEndpoint(adsbRaw);
  if (!url) { state.aircraft = []; state.adsbOk = null; return; }
  try {
    const d = await getJson(url);
    state.aircraft = (d.aircraft || []).filter(a => a.lat != null && a.lon != null);
    state.adsbOk = true;
  } catch {
    state.aircraft = [];
    state.adsbOk = false;
  }
}

// ---------- grid helpers ----------

function makeGrid(rows) {
  return {
    ch: Array.from({ length: rows }, () => Array(COLS).fill(' ')),
    cl: Array.from({ length: rows }, () => Array(COLS).fill('')),
    rows,
  };
}

function put(g, row, col, text, cls = '') {
  if (row < 0 || row >= g.rows) return;
  for (let i = 0; i < text.length; i++) {
    const c = col + i;
    if (c >= 0 && c < COLS) { g.ch[row][c] = text[i]; g.cl[row][c] = cls; }
  }
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function gridToHtml(g) {
  const out = [];
  for (let r = 0; r < g.rows; r++) {
    let line = '', run = '', runCls = g.cl[r][0];
    for (let c = 0; c <= COLS; c++) {
      const cls = c < COLS ? g.cl[r][c] : null;
      if (cls !== runCls || c === COLS) {
        line += runCls ? `<span class="${runCls}">${esc(run)}</span>` : esc(run);
        run = ''; runCls = cls;
      }
      if (c < COLS) run += g.ch[r][c];
    }
    out.push(line);
  }
  return out.join('\n');
}

// ---------- big digits (3x5) ----------

const FONT = {
  '0': ['ÔľłÔľłÔľł', 'Ôľł Ôľł', 'Ôľł Ôľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł'],
  '1': [' Ôľł ', 'ÔľłÔľł ', ' Ôľł ', ' Ôľł ', 'ÔľłÔľłÔľł'],
  '2': ['ÔľłÔľłÔľł', '  Ôľł', 'ÔľłÔľłÔľł', 'Ôľł  ', 'ÔľłÔľłÔľł'],
  '3': ['ÔľłÔľłÔľł', '  Ôľł', 'ÔľłÔľłÔľł', '  Ôľł', 'ÔľłÔľłÔľł'],
  '4': ['Ôľł Ôľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł', '  Ôľł', '  Ôľł'],
  '5': ['ÔľłÔľłÔľł', 'Ôľł  ', 'ÔľłÔľłÔľł', '  Ôľł', 'ÔľłÔľłÔľł'],
  '6': ['ÔľłÔľłÔľł', 'Ôľł  ', 'ÔľłÔľłÔľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł'],
  '7': ['ÔľłÔľłÔľł', '  Ôľł', '  Ôľł', '  Ôľł', '  Ôľł'],
  '8': ['ÔľłÔľłÔľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł'],
  '9': ['ÔľłÔľłÔľł', 'Ôľł Ôľł', 'ÔľłÔľłÔľł', '  Ôľł', 'ÔľłÔľłÔľł'],
};

function putBig(g, row, col, text, cls) {
  let x = col;
  for (const c of text) {
    const glyph = FONT[c];
    if (!glyph) { x += 2; continue; }
    for (let r = 0; r < 5; r++) put(g, row + r, x, glyph[r], cls);
    x += 4;
  }
  return x;
}

// ---------- sections ----------

function charValue(name) {
  const cv = (state.gauge.characteristicValues || []).find(v => v.shortname === name);
  return cv ? cv.value : null;
}

function trendPerHour() {
  const h = state.history;
  if (h.length < 5) return null;
  const last = h[h.length - 1], ago = h[Math.max(0, h.length - 5)];
  return last.value - ago.value;
}

function drawHeader(g, row, t) {
  const info = state.info, cur = state.gauge.currentMeasurement;
  const title = `ÔöÇÔöÇÔöÇ PEGELONLINE://${station} `;
  const meta = ` ${info.water.shortname} ┬Ě KM ${info.km ?? '?'} ÔöÇÔöÇÔöÇ`;
  put(g, row, 0, title.padEnd(COLS - meta.length, 'ÔöÇ') + meta, 'd');
  put(g, row, 4, `PEGELONLINE://${station}`, 'b');

  const x = putBig(g, row + 2, 2, String(Math.round(cur.value)), 'b');
  put(g, row + 6, x + 1, 'cm', 'd');

  const trend = trendPerHour();
  const arrow = trend === null ? 'ÔľČ' : trend > 1 ? 'Ôľ▓' : trend < -1 ? 'Ôľ╝' : 'ÔľČ';
  const sign = trend === null ? '' : (trend > 0 ? '+' : '') + trend.toFixed(0);
  put(g, row + 2, x + 6, `${arrow} ${sign} cm/h`, trend > 1 ? 'b' : '');
  put(g, row + 4, x + 6, `state: [${(cur.stateMnwMhw || 'unknown').toUpperCase()}]`, 'd');
  put(g, row + 6, x + 6, new Date(cur.timestamp).toISOString().replace('T', ' ').slice(0, 16) + ' UTC', 'd');
  if (state.adsbOk !== null) {
    const status = state.adsbOk ? `adsb: ${state.aircraft.length} aircraft` : 'adsb: receiver offline';
    put(g, row + 7, 2, status, 'd');
  }
  return row + 8;
}

function drawChart(g, row, t) {
  const value = state.gauge.currentMeasurement.value;
  const mhw = charValue('MHW'), mw = charValue('MW'), mnw = charValue('MNW');
  const topCm = Math.max((mhw || mw * 1.5 || value * 1.5 || 100) * 1.06, value * 1.15);
  const chartW = COLS - 12;
  const rowOf = cm => row + Math.round((CHART_ROWS - 1) * (1 - cm / topCm));
  const surface = Math.min(rowOf(value), row + CHART_ROWS - 3);
  const bedTop = row + CHART_ROWS - 3;

  // riverbed: seeded bumpy profile, 1-3 rows tall
  const seed = [...station].reduce((a, c) => a + c.charCodeAt(0), 0);
  for (let x = 0; x < chartW; x++) {
    const h = Math.min(3, Math.max(1, Math.round(2 + Math.sin(x * 0.31 + seed) * 0.9 + Math.sin(x * 0.11 + seed * 2) * 0.7)));
    for (let r = 0; r < h; r++) put(g, row + CHART_ROWS - 1 - r, x, r === h - 1 ? 'Ôľô' : 'Ôľł', 'd');
  }

  // water body with drifting current particles
  for (let r = surface + 1; r < row + CHART_ROWS; r++) {
    for (let x = 0; x < chartW; x++) {
      if (g.ch[r][x] !== ' ') continue;
      const drift = (x + Math.floor(t * 5) + r * 37) % 29;
      put(g, r, x, drift === 0 ? '┬Ě' : 'ÔľĹ', 'w');
    }
  }

  // animated wave surface
  const waves = '~Ôëł~~Ôł╝Ôëł~Ôł╝';
  for (let x = 0; x < chartW; x++) {
    const i = ((x + Math.floor(t * 6)) % waves.length + waves.length) % waves.length;
    put(g, surface, x, waves[i], 'w');
  }

  // characteristic level markers
  for (const [label, cm] of [['MHW', mhw], ['MW', mw], ['MNW', mnw]]) {
    if (cm === null || cm > topCm) continue;
    const r = rowOf(cm);
    if (r === surface) continue;
    for (let x = 0; x < chartW; x += 2) if (g.ch[r][x] === ' ' || g.ch[r][x] === 'ÔľĹ') put(g, r, x, 'ÔĽî', 'd');
    put(g, r, chartW + 1, `ÔöĄ ${label} ${cm}`, 'd');
  }
  put(g, surface, chartW + 1, `ÔŚä W ${value}`, 'b');

  // aircraft in the sky, projected onto the river axis between neighbor stations
  const n = state.neighbors;
  if (state.adsbOk !== null && n.length >= 2) {
    const L = n[n.length - 1], R = n[0]; // left = downstream (max km), right = upstream
    const kx = Math.cos((L.lat * Math.PI) / 180);
    const ax = (R.lon - L.lon) * kx, ay = R.lat - L.lat;
    const len2 = ax * ax + ay * ay;
    for (const a of state.aircraft) {
      const px = (a.lon - L.lon) * kx, py = a.lat - L.lat;
      const frac = (px * ax + py * ay) / len2;
      if (frac < 0 || frac > 1) continue;
      const lateralKm = (Math.abs(px * ay - py * ax) / Math.sqrt(len2)) * 111;
      if (lateralKm > 50) continue;
      const alt = a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0);
      const skyTop = row + 1, skyBottom = surface - 3;
      if (skyBottom <= skyTop) continue;
      const y = skyBottom - Math.round((Math.min(alt, 42000) / 42000) * (skyBottom - skyTop));
      const x = Math.round(frac * (chartW - 1));
      const tr = ((a.track ?? 0) * Math.PI) / 180;
      const movingRight = Math.sin(tr) * ax + Math.cos(tr) * ay > 0;
      const callsign = (a.flight || '').trim() || a.hex || '';
      const level = alt >= 5000 ? 'FL' + Math.round(alt / 100) : alt + 'ft';
      if (movingRight) {
        put(g, y, x, '+>', 'b');
        put(g, y, x + 3, `${callsign} ${level}`, 'd');
      } else {
        put(g, y, Math.max(0, x - 1), '<+', 'b');
        put(g, y, x + 2, `${callsign} ${level}`, 'd');
      }
    }
  }

  // little ship, bobbing downstream (Bonn view: downstream is to the left)
  if (surface > row + 2) {
    const shipX = chartW - 10 - Math.floor((t * 1.3) % (chartW - 14));
    const bob = Math.sin(t * 1.6) > 0.4 ? -1 : 0;
    put(g, surface - 2 + bob, shipX + 2, '/|', 'b');
    put(g, surface - 1 + bob, shipX, '_/_|__', 'b');
    put(g, surface + bob, shipX, '\\____/', 'b');
  }
  return row + CHART_ROWS + 1;
}

function drawSparkline(g, row, t) {
  const h = state.history;
  if (h.length < 2) { put(g, row, 0, '15-DAY HISTORY: no data', 'd'); return row + 2; }
  const chartW = COLS - 12;
  const step = h.length / chartW;
  const vals = Array.from({ length: chartW }, (_, x) => h[Math.min(h.length - 1, Math.floor(x * step))].value);
  const min = Math.min(...vals), max = Math.max(...vals), span = Math.max(max - min, 1);
  put(g, row, 0, `15-DAY HISTORY`, 'd');
  put(g, row, 17, `min ${min}  max ${max}`, 'd');
  const partial = ' ÔľüÔľéÔľâÔľäÔľůÔľćÔľç';
  for (let x = 0; x < chartW; x++) {
    const level = ((vals[x] - min) / span) * SPARK_ROWS * 8;
    for (let r = 0; r < SPARK_ROWS; r++) {
      const cellLevel = Math.max(0, Math.min(8, level - r * 8));
      const rr = row + 1 + SPARK_ROWS - 1 - r;
      if (cellLevel >= 8) put(g, rr, x, 'Ôľł', 'w');
      else if (cellLevel >= 1) put(g, rr, x, partial[Math.floor(cellLevel)], 'w');
    }
  }
  put(g, row + 1, chartW + 1, `ÔöÉ now`, 'd');
  put(g, row + SPARK_ROWS, chartW + 1, `Ôöś ${state.history.length} pts`, 'd');
  return row + SPARK_ROWS + 2;
}

function drawProfile(g, row) {
  const n = state.neighbors;
  put(g, row, 0, 'WATER SURFACE ELEVATION ┬Ě m NHN', 'd');
  if (n.length < 2) {
    put(g, row + 1, 0, n.length === 0 ? 'locating neighbor stationsÔÇŽ' : 'no neighbor stations with gauge zero on this water', 'd');
    return row + 3;
  }
  const kmMin = n[0].km, kmSpan = Math.max(n[n.length - 1].km - kmMin, 0.1);
  const elevs = n.map(p => p.elev);
  const eMin = Math.min(...elevs), eSpan = Math.max(Math.max(...elevs) - eMin, 0.1);
  const plotW = COLS - 26;
  const pts = n.map(p => ({
    x: 2 + Math.round((1 - (p.km - kmMin) / kmSpan) * plotW),
    y: row + 1 + Math.round((1 - (p.elev - eMin) / eSpan) * (PROFILE_ROWS - 3)),
    p,
  }));
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    const steps = Math.max(Math.abs(b.x - a.x), 1), dir = Math.sign(b.x - a.x) || 1;
    for (let s = 1; s < steps; s++) {
      put(g, Math.round(a.y + ((b.y - a.y) * s) / steps), a.x + dir * s, '┬Ě', 'w');
    }
  }
  for (const { x, y, p } of pts) {
    const self = p.name === station;
    put(g, y, x, 'ÔŚë', self ? 'b' : '');
    const label = `${p.name} ${p.elev.toFixed(2)}`;
    const lx = Math.min(Math.max(0, x - 3), COLS - label.length);
    put(g, y + 1, lx, label, self ? 'b' : 'd');
    put(g, y + 2, lx, `km ${p.km}`, 'd');
  }
  put(g, row, COLS - 14, 'ÔćÉ downstream Ôëő', 'd');
  return row + PROFILE_ROWS + 1;
}

// ---------- station prompt ----------

const stationInput = document.getElementById('station-input');
const adsbInput = document.getElementById('adsb-input');
stationInput.value = station;
adsbInput.value = adsbRaw;
document.getElementById('prompt').addEventListener('submit', e => {
  e.preventDefault();
  adsbRaw = adsbInput.value.trim();
  if (adsbRaw) localStorage.setItem('pegel.adsb', adsbRaw);
  else localStorage.removeItem('pegel.adsb');
  loadAircraft();
  const v = stationInput.value.trim();
  if (v && v !== station) location.search = '?station=' + encodeURIComponent(v.toUpperCase());
});
let stationListLoaded = false;
stationInput.addEventListener('focus', async () => {
  if (stationListLoaded) return;
  stationListLoaded = true;
  try {
    const all = await getJson(`${API}/stations.json`);
    const list = document.getElementById('stations');
    for (const name of [...new Set(all.map(s => s.shortname))].sort()) {
      const opt = document.createElement('option');
      opt.value = name;
      list.appendChild(opt);
    }
  } catch { stationListLoaded = false; }
});

// ---------- main loop ----------

function render(t) {
  if (state.error) {
    screen.textContent = `ERROR\n\n${state.error}`;
    return;
  }
  if (!state.gauge || !state.gauge.currentMeasurement) {
    screen.textContent = `connecting to pegelonline.wsv.de ${'┬Ě'.repeat(1 + Math.floor(t * 2) % 3)}`;
    return;
  }
  const g = makeGrid(8 + CHART_ROWS + 1 + SPARK_ROWS + 2 + PROFILE_ROWS + 1);
  let row = drawHeader(g, 0, t);
  row = drawChart(g, row, t);
  row = drawSparkline(g, row, t);
  drawProfile(g, row);
  screen.innerHTML = gridToHtml(g);
}

function fitFont() {
  const px = Math.min(15, (document.documentElement.clientWidth * 0.94) / (COLS * 0.602));
  screen.style.fontSize = px.toFixed(2) + 'px';
}

window.addEventListener('resize', fitFont);
fitFont();
loadData();
setInterval(loadData, REFRESH_MS);
loadAircraft();
setInterval(loadAircraft, ADSB_REFRESH_MS);
const start = performance.now();
setInterval(() => render((performance.now() - start) / 1000), 120);
</script>
</body>
</html>
