name: archive-update

# Refreshes the running-year WSV archive data on the `archive` branch once a
# month. The --current step pulls the last month from the PEGELONLINE REST
# API (requests 35 days, the server caps at ~31) and upserts them into
# current.json; in January the just-completed year
# is first re-backfilled from the WSV ZIP archive (authoritative; the REST
# accumulation only fills its gaps, and graduates unchanged if the ZIP path
# fails — the gap sweep below then retries) before it freezes into the
# immutable closed.json bundle. A push to the data branch cannot trigger
# pages.yml (the orphan branch carries no workflow files), so the last step
# dispatches the deploy explicitly — the site stays at most one month stale.
on:
  schedule:
    - cron: '23 4 3 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the pages deploy afterwards

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          ref: archive
          path: archive-branch
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Fetch current-year data from WSV (REST, last 30 days)
        run: node scripts/fetch-wsv-archive.mjs --current --out archive-branch/archive
      - name: Gap sweep (new stations + retry the none-stations)
        # the plain backfill IS the sweep: stations with a complete meta.json
        # are skipped, stations that never succeeded (newly commissioned, or
        # archive-less so far) get a full 2000->last-year attempt
        run: node scripts/fetch-wsv-archive.mjs --out archive-branch/archive
      - name: Commit and push
        id: push
        run: |
          cd archive-branch
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add archive
          git diff --cached --quiet && { echo 'no changes'; exit 0; }
          git commit -m "Refresh current-year archive data ($(date -u +%Y-%m))"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
      - name: Redeploy pages
        # a push to the archive branch cannot trigger pages.yml itself — the
        # orphan data branch carries no workflow files — so dispatch it here
        if: steps.push.outputs.pushed == 'true'
        run: gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
